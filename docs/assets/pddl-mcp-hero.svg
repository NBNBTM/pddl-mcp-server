<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">PDDL MCP Server overview</title>
  <desc id="desc">A clean architecture overview for natural language to PDDL planning with Fast Downward.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#102030"/>
      <stop offset="0.55" stop-color="#143b46"/>
      <stop offset="1" stop-color="#263b2f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.30"/>
    </filter>
  </defs>
  <rect width="1200" height="480" fill="url(#bg)"/>
  <g opacity="0.18" stroke="#f4d35e" stroke-width="2">
    <path d="M88 390 C210 300, 310 400, 450 310 S730 260, 880 320 S1060 390, 1150 310" fill="none"/>
    <path d="M95 115 H1120" opacity="0.45"/>
    <path d="M95 170 H1120" opacity="0.28"/>
    <path d="M95 225 H1120" opacity="0.18"/>
  </g>
  <text x="80" y="110" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="750">PDDL MCP Server</text>
  <text x="82" y="158" fill="#d7eef0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">Natural language or explicit PDDL input to verified Fast Downward plans.</text>
  <g filter="url(#shadow)">
    <rect x="82" y="218" width="235" height="96" rx="14" fill="#f7fbfc"/>
    <text x="112" y="256" fill="#12202b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">1. Understand</text>
    <text x="112" y="286" fill="#3e5963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">LLM plus deterministic fallback</text>
    <rect x="368" y="218" width="235" height="96" rx="14" fill="#f7fbfc"/>
    <text x="398" y="256" fill="#12202b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">2. Model</text>
    <text x="398" y="286" fill="#3e5963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Generate domain and problem PDDL</text>
    <rect x="654" y="218" width="235" height="96" rx="14" fill="#f7fbfc"/>
    <text x="684" y="256" fill="#12202b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">3. Plan</text>
    <text x="684" y="286" fill="#3e5963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Run Fast Downward search</text>
    <rect x="940" y="218" width="235" height="96" rx="14" fill="#f7fbfc"/>
    <text x="970" y="256" fill="#12202b" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700">4. Return</text>
    <text x="970" y="286" fill="#3e5963" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">Validate plan and artifacts</text>
  </g>
  <g fill="none" stroke="#f4d35e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M326 266 H357"/>
    <path d="M346 256 L357 266 L346 276"/>
    <path d="M612 266 H643"/>
    <path d="M632 256 L643 266 L632 276"/>
    <path d="M898 266 H929"/>
    <path d="M918 256 L929 266 L918 276"/>
  </g>
  <rect x="80" y="365" width="620" height="54" rx="12" fill="#102030" opacity="0.75" stroke="#8bd3dd"/>
  <text x="110" y="400" fill="#eef9f7" font-family="SFMono-Regular, Consolas, monospace" font-size="18">plan_from_text("farmer, wolf, goat, cabbage...")</text>
  <rect x="745" y="365" width="370" height="54" rx="12" fill="#102030" opacity="0.75" stroke="#f4d35e"/>
  <text x="775" y="400" fill="#fff4c2" font-family="SFMono-Regular, Consolas, monospace" font-size="18">7-step valid plan</text>
</svg>
